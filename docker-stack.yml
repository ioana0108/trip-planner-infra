version: "3.8"

services:
  auth-service:
    image: trip-planner-auth-service:latest
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=trip_planner;Username=postgres;Password=postgres"
    depends_on:
      - postgres
    deploy:
      replicas: 1

  trip-service:
    image: trip-planner-trip-service:latest
    ports:
      - "8082:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=trip_planner;Username=postgres;Password=postgres"
    depends_on:
      - postgres
    deploy:
      replicas: 1

  itinerary-service:
    image: trip-planner-itinerary-service:latest
    ports:
      - "8083:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=trip_planner;Username=postgres;Password=postgres"
    depends_on:
      - postgres
    deploy:
      replicas: 1

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tripplanner.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    deploy:
      replicas: 1

  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    configs:
      - source: kong_config
        target: /kong/declarative/kong.yml
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - auth-service
      - trip-service
      - itinerary-service
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    depends_on:
      - kong
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      replicas: 1

volumes:
  postgres_data:

configs:
  kong_config:
    file: ./kong.yml

  prometheus_config:
    file: ./prometheus.yml